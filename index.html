<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Black Wayback</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: black;
}
</style>
</head>

<body>

<script>
(function() {
    function hackWaybackBar() {
        const bar = document.getElementById("wm-ipp");
        const base = document.getElementById("wm-ipp-base");

        if (base) {
            base.style.setProperty("display", "block", "important");
        }

        if (bar) {
            bar.style.setProperty("position", "fixed", "important");
            bar.style.setProperty("top", "auto", "important");
            bar.style.setProperty("bottom", "0", "important");
            bar.style.setProperty("left", "0", "important");
            bar.style.setProperty("right", "0", "important");

            // Inversion des couleurs uniquement de la banderole
            bar.style.setProperty("filter", "invert(1)", "important");
        }
    }

    // Attendre que la Wayback ait fini son injection
    const observer = new MutationObserver(hackWaybackBar);

    observer.observe(document.documentElement, {
        childList: true,
        subtree: true
    });

    // Plusieurs essais pour couvrir les chargements tardifs
    hackWaybackBar();
    setTimeout(hackWaybackBar, 500);
    setTimeout(hackWaybackBar, 1500);
})();
</script>

</body>
</html>
