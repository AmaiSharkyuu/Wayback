<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Wayback Experiment</title>

<style>
:root{
    color-scheme: light;
}

html{
    background:#fff;
    filter:invert(1);
}

body{
    margin:0;
    width:100vw;
    height:100vh;
    background:#fff;
    color:#000;
    overflow:hidden;

    font-family:system-ui,sans-serif;
}

/* Ta page uniquement */
*{
    border-radius:0 !important;
    box-shadow:none !important;
}

h1{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:3rem;
    font-weight:300;
    user-select:none;
}

/* Quelques essais visuels */
html{
    image-rendering:pixelated;
}

body{
    text-rendering:optimizeLegibility;
}
</style>
</head>

</html>
