<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Black Wayback</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
}

/* La page reste entièrement noire */
body {
    overflow: hidden;
}

/* Modification de la banderole Wayback */
#wm-ipp {
    top: auto !important;
    bottom: 0 !important;
    filter: invert(1) !important;
}
</style>
</head>

<body>

<script>
function modifyWayback() {
    const bar = document.getElementById("wm-ipp");

    if (bar) {
        // Déplacement en bas
        bar.style.setProperty("top", "auto", "important");
        bar.style.setProperty("bottom", "0", "important");

        // Inversion des couleurs
        bar.style.setProperty("filter", "invert(1)", "important");
    }
}

// La Wayback peut injecter sa barre après le chargement,
// donc on surveille l'apparition
const observer = new MutationObserver(modifyWayback);

observer.observe(document.documentElement, {
    childList: true,
    subtree: true
});

modifyWayback();
</script>

</body>
</html>
